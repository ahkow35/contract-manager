<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Option 2: "The Chisel" — a highlighter marker tip, angled, geometric -->

  <!-- Marker body — clean rectangle, angled 45° -->
  <g transform="rotate(-45, 100, 100)">
    <!-- Barrel -->
    <rect x="76" y="30" width="48" height="100" rx="8" ry="8" fill="#1A1A1A"/>
    <!-- Cap band -->
    <rect x="76" y="30" width="48" height="18" rx="8" ry="8" fill="#333333"/>
    <!-- Tip housing -->
    <rect x="82" y="130" width="36" height="16" rx="2" ry="2" fill="#333333"/>
    <!-- Chisel tip — the highlight yellow -->
    <polygon points="82,146 118,146 112,170 88,170" fill="#FFE033"/>
  </g>

  <!-- Yellow highlight stroke behind/below — the output of the marker -->
  <rect x="20" y="140" width="160" height="18" rx="9" ry="9" fill="#FFE033" opacity="0.30"/>
  <rect x="20" y="140" width="90" height="18" rx="9" ry="9" fill="#FFE033" opacity="0.85"/>
</svg>
